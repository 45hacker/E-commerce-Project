<!DOCTYPE html>
<html>
<body>

<h2>Add Product</h2>

<input id="name" placeholder="Name"><br><br>
<input id="price" placeholder="Price"><br><br>
<textarea id="desc" placeholder="Description"></textarea><br><br>

<!-- 🔥 4 IMAGE INPUTS -->
<input type="file" id="file1"><br><br>
<input type="file" id="file2"><br><br>
<input type="file" id="file3"><br><br>
<input type="file" id="file4"><br><br>

<button onclick="uploadProduct()">Upload</button>

<p id="msg"></p>

<script>
async function uploadProduct() {

  const nameVal = document.getElementById("name").value;
  const priceVal = document.getElementById("price").value;
  const descVal = document.getElementById("desc").value;

  const files = [
    document.getElementById("file1").files[0],
    document.getElementById("file2").files[0],
    document.getElementById("file3").files[0],
    document.getElementById("file4").files[0]
  ];

  try {

    let uploadedImages = [];

    // 🔥 STEP 1: upload each selected image
    for (let i = 0; i < files.length; i++) {

      if (!files[i]) continue;

      const fd = new FormData();
      fd.append("file", files[i]);

      const u = await fetch("http://127.0.0.1:8000/upload-image", {
        method: "POST",
        body: fd
      });

      const upload = await u.json();
      console.log("UPLOAD:", upload);

      if (upload.url) {
        uploadedImages.push(upload.url);
      }
    }

    if (!uploadedImages.length) {
      alert("No image selected ❌");
      return;
    }

    // 🔥 STEP 2: create product (same)
    const p = await fetch("http://127.0.0.1:8000/add-product", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        name: nameVal,
        price: Number(priceVal),
        description: descVal
      })
    });

    const product = await p.json();
    console.log("PRODUCT:", product);

    if (!product.product_id) {
      alert("Product create failed ❌");
      return;
    }

    // 🔥 STEP 3: link all images
    for (let i = 0; i < uploadedImages.length; i++) {

      await fetch("http://127.0.0.1:8000/add-product-image", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          product_id: product.product_id,
          image_url: uploadedImages[i]
        })
      });
    }

    document.getElementById("msg").innerText = "Product Added ✅";

  } catch (err) {
    console.log(err);
    alert("Something broke ❌");
  }
}
</script>

</body>
</html>
